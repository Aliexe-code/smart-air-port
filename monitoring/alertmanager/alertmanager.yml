# AlertManager configuration for Smart Airport
global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'nestjst@gmail.com'
  smtp_auth_username: 'nestjst@gmail.com'
  smtp_auth_password: 'llne nrbs buvv uaft'

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'web.hook'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
    - match:
        severity: warning
      receiver: 'warning-alerts'

receivers:
  - name: 'web.hook'
    webhook_configs:
      - url: 'http://127.0.0.1:5001/'

  - name: 'critical-alerts'
    email_configs:
      - to: 'your-email@example.com'  # Replace with your email
        subject: '🚨 CRITICAL: Smart Airport Alert'
        body: |
          Alert: {{ .GroupLabels.alertname }}
          Severity: {{ .CommonLabels.severity }}
          
          {{ range .Alerts }}
          Summary: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          {{ end }}
          
          Dashboard: http://localhost:3000/d/smart-airport
          Prometheus: http://localhost:9090
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'  # Replace with your Slack webhook
        channel: '#alerts'
        title: '🚨 Critical Alert: Smart Airport'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}

  - name: 'warning-alerts'
    email_configs:
      - to: 'your-email@example.com'  # Replace with your email
        subject: '⚠️ WARNING: Smart Airport Alert'
        body: |
          Alert: {{ .GroupLabels.alertname }}
          Severity: {{ .CommonLabels.severity }}
          
          {{ range .Alerts }}
          Summary: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          {{ end }}
          
          Dashboard: http://localhost:3000/d/smart-airport
          Prometheus: http://localhost:9090

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'dev', 'instance']
