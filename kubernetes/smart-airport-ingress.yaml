apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smart-airport-ingress
  labels:
    app: smart-airport
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: smart-airport.local  # Change to your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: smart-airport-service
            port:
              number: 3001
