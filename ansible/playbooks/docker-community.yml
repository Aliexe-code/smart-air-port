---
# Docker Community deployment playbook - uses docker community modules
- name: Smart Airport Application Deployment with Docker Community
  hosts: on_prems
  become: yes
  gather_facts: yes
  
  vars:
    selected_roles:
      - docker_install
      - deploy_dockercommunity
    build_number: "{{ build_number | default('latest') }}"

  pre_tasks:
    - name: Display deployment information
      ansible.builtin.debug:
        msg:
          - "Starting Docker Community deployment of Smart Airport Application"
          - "Target hosts: {{ ansible_play_hosts }}"
          - "Build number: {{ build_number }}"

  roles:
    - docker_install
    - deploy_dockercommunity

  post_tasks:
    - name: Display completion message
      ansible.builtin.debug:
        msg:
          - "Docker Community deployment completed successfully!"
          - "Application is available at: http://{{ ansible_host }}:{{ nginx_port | default(80) }}"
