---
# Variables for NestJS Smart Airport Application
app_name: "smart-air-port"
app_deploy_dir: "/home/{{ ansible_user }}/{{ app_name }}"
app_port: 3001
node_env: "production"
backup_enabled: true

# Application configuration
app_config:
  port: "{{ app_port }}"
  node_env: "{{ node_env }}"
  
# PM2 configuration
pm2_config:
  name: "{{ app_name }}"
  script: "dist/main.js"
  instances: 1
  exec_mode: "cluster"
  watch: false
  max_memory_restart: "1G"
  env:
    NODE_ENV: "{{ node_env }}"
    PORT: "{{ app_port }}"
