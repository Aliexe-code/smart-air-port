---
# Docker packages for different OS families
docker_packages_debian:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-compose-plugin
  - docker-buildx-plugin
  - python3-requests
  - python3-docker

docker_packages_redhat:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-compose-plugin
  - docker-buildx-plugin
  - python3-requests
  - python3-docker

# Set packages based on OS family
docker_packages: "{{ docker_packages_debian if ansible_os_family == 'Debian' else docker_packages_redhat }}"

# Docker daemon configuration
docker_daemon_config:
  log-driver: "json-file"
  log-opts:
    max-size: "10m"
    max-file: "3"
  storage-driver: "overlay2"

# Docker service configuration
docker_service_enabled: true
docker_service_state: started

# User configuration
docker_users:
  - "{{ ansible_user }}"
  - "{{ deploy_user | default(ansible_user) }}"